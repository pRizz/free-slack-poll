name: free-slack-poll

x-app-environment: &app-environment
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
  DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-UTC}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  POLL_ADMIN_USER_IDS: ${POLL_ADMIN_USER_IDS:-}
  POLL_CLOSE_INTERVAL_SECONDS: ${POLL_CLOSE_INTERVAL_SECONDS:-30}
  POLL_SYNC_INTERVAL_SECONDS: ${POLL_SYNC_INTERVAL_SECONDS:-15}
  SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:?SLACK_APP_TOKEN is required}
  SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:?SLACK_BOT_TOKEN is required}
  SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:?SLACK_SIGNING_SECRET is required}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-free_slack_poll}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
    command: ["node", "dist/db/migrate.js"]
    depends_on:
      db:
        condition: service_healthy
    environment: *app-environment
    profiles: ["tools"]

  app:
    build:
      context: .
    command: ["node", "dist/app.js"]
    depends_on:
      db:
        condition: service_healthy
    environment: *app-environment
    healthcheck:
      test: ["CMD", "node", "dist/scripts/preflight.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    init: true
    restart: unless-stopped

volumes:
  postgres_data:
